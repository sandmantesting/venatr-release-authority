name: Verify keyless release authority

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  verify:
    name: Exercise protected keyless signing
    environment: venatr-production-promotion
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {persist-credentials: false, clean: true, ref: main}
      - name: Create a run-bound authority challenge
        shell: bash
        run: |
          set -euo pipefail
          printf '{"repository":"%s","run_attempt":"%s","run_id":"%s","workflow_sha":"%s"}\n' \
            "$GITHUB_REPOSITORY" "$GITHUB_RUN_ATTEMPT" "$GITHUB_RUN_ID" "$GITHUB_WORKFLOW_SHA" \
            > authority-challenge.json
      - name: Attest the challenge through GitHub OIDC and Sigstore
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: authority-challenge.json
      - name: Verify identity, protected source, runner and transparency
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test -s "$ATTESTATION_BUNDLE"
          gh attestation verify authority-challenge.json \
            --bundle "$ATTESTATION_BUNDLE" \
            --repo "$GITHUB_REPOSITORY" \
            --cert-identity "https://github.com/sandmantesting/venatr-release-authority/.github/workflows/verify-keyless-authority.yml@refs/heads/main" \
            --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
            --signer-digest "$GITHUB_WORKFLOW_SHA" \
            --source-ref refs/heads/main \
            --source-digest "$GITHUB_WORKFLOW_SHA" \
            --deny-self-hosted-runners \
            --format json > verification.json
          python -c 'import json; value=json.load(open("verification.json")); assert value and value[0]["verificationResult"]["verifiedTimestamps"]'
