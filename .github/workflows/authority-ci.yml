name: Authority CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify public authority
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {persist-credentials: false, clean: true}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.12.10"}
      - run: python scripts/verify_authority.py
      - run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Verify every candidate request
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for request in requests/*.json; do
            python scripts/verify_authority.py --request "$request"
          done
      - name: Verify every persisted authority-state attestation
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for state in state/generation-*.json; do
            [[ "$state" == *.sigstore.json ]] && continue
            bundle="${state%.json}.sigstore.json"
            test -s "$bundle"
            workflow_sha="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["workflow"]["sha"])' "$state")"
            gh attestation verify "$state" \
              --bundle "$bundle" \
              --repo sandmantesting/venatr-release-authority \
              --cert-identity "https://github.com/sandmantesting/venatr-release-authority/.github/workflows/bootstrap-generation-zero.yml@refs/heads/main" \
              --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
              --signer-digest "$workflow_sha" \
              --source-ref refs/heads/main \
              --source-digest "$workflow_sha" \
              --deny-self-hosted-runners
          done
