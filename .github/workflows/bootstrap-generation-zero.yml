name: Bootstrap Venatr generation zero

on:
  workflow_dispatch:
    inputs:
      candidate-request-path:
        description: Reviewed request beneath requests/ on protected main
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  bootstrap:
    name: Sign generation zero through KMS
    environment: venatr-production-promotion
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: {persist-credentials: true, clean: true, ref: main}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.12.10"}
      - uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ vars.VENATR_AUTHORITY_SIGNING_ROLE_ARN }}
          aws-region: ${{ vars.VENATR_AUTHORITY_SIGNING_REGION }}
          role-session-name: venatr-authority-${{ github.run_id }}-${{ github.run_attempt }}
      - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with: {cosign-release: v3.0.6}
      - name: Validate protected-main request and create state
        env:
          REQUEST_PATH: ${{ inputs.candidate-request-path }}
          GITHUB_WORKFLOW_SHA: ${{ github.workflow_sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$REQUEST_PATH" =~ ^requests/[A-Za-z0-9._-]+\.json$ ]]
          test "$(git branch --show-current)" = main
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          python scripts/verify_authority.py --request "$REQUEST_PATH"
          CANDIDATE_ID="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["candidate_id"])' "$REQUEST_PATH")"
          test ! -e state/generation-0.json
          mkdir -p state
          python scripts/create_genesis_state.py \
            --request "$REQUEST_PATH" --output state/generation-0.json \
            --workflow-repository "$GITHUB_REPOSITORY" \
            --workflow-ref "$GITHUB_WORKFLOW_REF" --workflow-sha "$GITHUB_WORKFLOW_SHA" \
            --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT"
          echo "CANDIDATE_ID=$CANDIDATE_ID" >> "$GITHUB_ENV"
      - name: KMS-sign the exact monotonic state
        env:
          KMS_KEY_URI: ${{ vars.VENATR_AUTHORITY_KMS_KEY_URI }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$KMS_KEY_URI" == awskms://* ]]
          cosign sign-blob --yes --key "$KMS_KEY_URI" \
            --bundle state/generation-0.sigstore.json state/generation-0.json
          cosign verify-blob --key authority/release-signing-root.pub \
            --bundle state/generation-0.sigstore.json state/generation-0.json
      - name: Open the independently reviewed state-persistence PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="authority/generation-0-${CANDIDATE_ID}"
          git config user.name "venatr-release-authority[bot]"
          git config user.email "venatr-release-authority[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add state/generation-0.json state/generation-0.sigstore.json
          git commit -m "release(authority): propose generation zero for ${CANDIDATE_ID}"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "release: persist Venatr generation zero" \
            --body "KMS-signed generation-zero authority state. Requires independent review and Authority CI; do not squash or rebase."
