name: Bootstrap Venatr generation zero

on:
  workflow_dispatch:
    inputs:
      candidate-request-path:
        description: Reviewed request beneath requests/ on protected main
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write
  attestations: write

jobs:
  bootstrap:
    name: Attest generation zero through keyless Sigstore
    environment: venatr-production-promotion
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {persist-credentials: true, clean: true, ref: main}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: {python-version: "3.12.10"}
      - name: Validate protected-main request and create state
        env:
          REQUEST_PATH: ${{ inputs.candidate-request-path }}
          GITHUB_WORKFLOW_SHA: ${{ github.workflow_sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$REQUEST_PATH" =~ ^requests/[A-Za-z0-9._-]+\.json$ ]]
          test "$(git branch --show-current)" = main
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          python scripts/verify_authority.py --request "$REQUEST_PATH"
          CANDIDATE_ID="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["candidate_id"])' "$REQUEST_PATH")"
          test ! -e state/generation-0.json
          mkdir -p state
          python scripts/create_genesis_state.py \
            --request "$REQUEST_PATH" --output state/generation-0.json \
            --workflow-repository "$GITHUB_REPOSITORY" \
            --workflow-ref "$GITHUB_WORKFLOW_REF" --workflow-sha "$GITHUB_WORKFLOW_SHA" \
            --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT"
          echo "CANDIDATE_ID=$CANDIDATE_ID" >> "$GITHUB_ENV"
      - name: Attest the exact monotonic state
        id: attest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: state/generation-0.json
      - name: Persist and independently verify the Sigstore bundle
        env:
          ATTESTATION_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_WORKFLOW_SHA: ${{ github.workflow_sha }}
        shell: bash
        run: |
          set -euo pipefail
          test -s "$ATTESTATION_BUNDLE"
          cp -- "$ATTESTATION_BUNDLE" state/generation-0.sigstore.json
          gh attestation verify state/generation-0.json \
            --bundle state/generation-0.sigstore.json \
            --repo "$GITHUB_REPOSITORY" \
            --cert-identity "https://github.com/sandmantesting/venatr-release-authority/.github/workflows/bootstrap-generation-zero.yml@refs/heads/main" \
            --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
            --signer-digest "$GITHUB_WORKFLOW_SHA" \
            --source-ref refs/heads/main \
            --source-digest "$GITHUB_WORKFLOW_SHA" \
            --deny-self-hosted-runners
      - name: Open the independently reviewed state-persistence PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="authority/generation-0-${CANDIDATE_ID}"
          git config user.name "venatr-release-authority[bot]"
          git config user.email "venatr-release-authority[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add state/generation-0.json state/generation-0.sigstore.json
          git commit -m "release(authority): propose generation zero for ${CANDIDATE_ID}"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "release: persist Venatr generation zero" \
            --body "Keyless Sigstore-attested generation-zero authority state with public Rekor transparency. Requires independent review and Authority CI. The protected squash merge must not modify either signed file."
